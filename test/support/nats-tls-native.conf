# NATS server config for TLS integration tests — native (non-Docker) variant.
#
# Used by macOS and Windows CI jobs which have no Docker. Cert paths below
# are resolved by NATS relative to the **process working directory**, which
# the CI runner sets to the package root (matching `dart test`'s CWD). Don't
# move these paths to be relative to this conf file's location — that
# resolution rule applies to `include` directives, not `cert_file`/`key_file`.
#
# The Docker variant (nats-tls.conf) keeps its container-absolute paths
# unchanged. Cert regeneration instructions live in nats-tls.conf — they
# apply to both files since they share test/support/certs/.

port: 4223
monitor_port: 8223

tls {
  cert_file: "test/support/certs/server-cert.pem"
  key_file:  "test/support/certs/server-key.pem"
}
