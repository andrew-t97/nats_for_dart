# NATS server config for TLS integration tests.
#
# Paths are resolved inside the container — `test/support/certs/` is mounted
# read-only at `/certs` by `DockerNatsTls`.
#
# ---------------------------------------------------------------------------
# Certificate regeneration (load-bearing — the committed certs expire 2036-04):
# Run from `test/support/certs/` with OpenSSL 3.x on PATH.
#
#   # 1) 10-year self-signed CA
#   openssl req -x509 -newkey rsa:2048 -sha256 -days 3650 -nodes \
#     -keyout ca-key.pem -out ca-cert.pem \
#     -subj "/CN=Test CA" \
#     -addext "basicConstraints=critical,CA:TRUE,pathlen:0"
#
#   # 2) Server key + CSR (CN=localhost)
#   openssl req -newkey rsa:2048 -sha256 -nodes \
#     -keyout server-key.pem -out server-csr.pem \
#     -subj "/CN=localhost"
#
#   # 3) SAN extension file (required — NATS clients reject certs without
#   #    a matching SAN even when CN=localhost).
#   printf 'subjectAltName=DNS:localhost,IP:127.0.0.1\nextendedKeyUsage=serverAuth\n' \
#     > server-ext.cnf
#
#   # 4) Sign the server cert with the CA (10-year validity)
#   openssl x509 -req -in server-csr.pem \
#     -CA ca-cert.pem -CAkey ca-key.pem -CAcreateserial \
#     -out server-cert.pem -days 3650 -sha256 \
#     -extfile server-ext.cnf
#
#   # 5) Clean up intermediates
#   rm server-csr.pem server-ext.cnf ca-cert.srl
# ---------------------------------------------------------------------------

port: 4223
monitor_port: 8223

tls {
  cert_file: "/certs/server-cert.pem"
  key_file:  "/certs/server-key.pem"
}
