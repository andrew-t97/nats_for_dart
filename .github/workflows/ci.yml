name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linting-and-formatting:
    name: Linting & Formatting (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.8"

      - run: dart pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Verify API docs
        run: dart doc --dry-run

  test-ubuntu:
    name: Tests (Ubuntu / Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.8"

      - run: dart pub get

      - name: Run tests
        run: dart test test/test_all.dart

  test-macos:
    name: Tests (macOS / native nats-server)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.8"

      - run: dart pub get

      - name: Install and start nats-server
        run: |
          brew install nats-server
          nats-server -js &
          nats-server -c test/support/nats-tls-native.conf &
          # Wait for TLS server monitoring endpoint to confirm readiness.
          ready=false
          for i in {1..30}; do
            if curl -fsS http://localhost:8223/healthz > /dev/null; then
              ready=true
              break
            fi
            sleep 0.5
          done
          if [ "$ready" != "true" ]; then
            echo "::error::TLS nats-server did not become ready on http://localhost:8223/healthz within timeout"
            exit 1
          fi

      - name: Run tests
        run: dart test test/test_all.dart

  test-windows:
    name: Tests (Windows / native nats-server)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.8"

      - run: dart pub get

      # Install + start servers + run tests in a single shell step. Splitting
      # them caused the `Start-Process -NoNewWindow` children to be torn down
      # at the step boundary on Windows runners, leaving nothing listening on
      # 4222/4223 by the time the test step started.
      - name: Install nats-server, start servers, and run tests
        run: |
          $latestTag = (Invoke-RestMethod "https://api.github.com/repos/nats-io/nats-server/releases/latest").tag_name
          $url = "https://github.com/nats-io/nats-server/releases/download/${latestTag}/nats-server-${latestTag}-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile nats-server.zip
          Expand-Archive nats-server.zip -DestinationPath nats-server-bin
          $natsDir = Get-ChildItem -Path nats-server-bin -Directory | Select-Object -First 1
          $env:PATH = "$($natsDir.FullName);$env:PATH"
          Start-Process nats-server -ArgumentList "-js" -NoNewWindow
          Start-Process nats-server -ArgumentList "-c","test/support/nats-tls-native.conf" -NoNewWindow
          # Wait for TLS server monitoring endpoint to confirm readiness.
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            try {
              $r = Invoke-WebRequest -Uri http://localhost:8223/healthz -UseBasicParsing -TimeoutSec 1
              if ($r.StatusCode -eq 200) { $ready = $true; break }
            } catch { Start-Sleep -Milliseconds 500 }
          }
          if (-not $ready) {
            Write-Host "::error::TLS nats-server did not become ready on http://localhost:8223/healthz within timeout"
            exit 1
          }
          dart test test/test_all.dart
        shell: pwsh

  publish-dry-run:
    name: Publish (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.8"

      - run: dart pub get

      - name: Publish dry run
        run: dart pub publish --dry-run
