name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linting-and-formatting:
    name: Linting & Formatting (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.8"

      - run: dart pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Verify API docs
        run: dart doc --dry-run

  test-ubuntu:
    name: Tests (Ubuntu / Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.8"

      - run: dart pub get

      - name: Run tests
        run: dart test test/test_all.dart

  test-macos:
    name: Tests (macOS / native nats-server)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.8"

      - run: dart pub get

      - name: Install and start nats-server
        run: |
          brew install nats-server
          nats-server -js &
          sleep 2

      - name: Run tests
        run: dart test test/test_all.dart

  test-windows:
    name: Tests (Windows / native nats-server)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.8"

      # Map the workspace to B:\ so that all source/include paths passed to
      # cl.exe stay short. Without this the fully-expanded cl.exe command line
      # (500+ source files x ~70 chars each) exceeds the Windows CreateProcess
      # 32,767-character limit and the build hook crashes before compiling.
      - name: Map workspace to short drive (B:)
        run: subst B: $env:GITHUB_WORKSPACE
        shell: pwsh

      - run: dart pub get
        working-directory: 'B:\'
        shell: pwsh

      - name: Install and start nats-server
        run: |
          $latestTag = (Invoke-RestMethod "https://api.github.com/repos/nats-io/nats-server/releases/latest").tag_name
          $version = $latestTag.TrimStart("v")
          $url = "https://github.com/nats-io/nats-server/releases/download/${latestTag}/nats-server-${latestTag}-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile nats-server.zip
          Expand-Archive nats-server.zip -DestinationPath nats-server-bin
          $natsDir = Get-ChildItem -Path nats-server-bin -Directory | Select-Object -First 1
          $env:PATH = "$($natsDir.FullName);$env:PATH"
          echo "$($natsDir.FullName)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Start-Process nats-server -ArgumentList "-js" -NoNewWindow
          Start-Sleep -Seconds 2
        shell: pwsh

      - name: Run tests
        run: dart test test/test_all.dart
        working-directory: 'B:\'
        shell: pwsh

  publish-dry-run:
    name: Publish (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.8"

      - run: dart pub get

      - name: Publish dry run
        run: dart pub publish --dry-run
