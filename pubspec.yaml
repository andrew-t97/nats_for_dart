name: nats_for_dart
description: Dart FFI bindings for the NATS C client — core pub/sub, JetStream, and KeyValue store.
version: 0.1.0
repository: https://github.com/andrew-t97/nats_for_dart
homepage: https://github.com/andrew-t97/nats_for_dart
issue_tracker: https://github.com/andrew-t97/nats_for_dart/issues
topics:
  - nats
  - messaging
  - pubsub
  - jetstream

license: Apache-2.0

environment:
  sdk: ^3.10.8

dependencies:
  ffi: ^2.0.0
  meta: ^1.10.0
  code_assets: ^1.0.0
  hooks: ^1.0.0
  logging: ^1.3.0

dev_dependencies:
  ffigen: ^18.0.0
  lints: ^6.0.0
  test: ^1.25.6
  coverage: ^1.12.0
